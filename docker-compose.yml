services:

  mysql:
    image: mysql:8.0
    container_name: rides_mysql
    environment:
      MYSQL_DATABASE: ridesdb
      MYSQL_USER: rides_user
      MYSQL_PASSWORD: rides_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: rides_redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── RabbitMQ ───────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rides_rabbitmq
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Backend Spring Boot ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rides_backend
    ports:
      - "8081:8080"
    environment:
      DB_HOST: mysql
      DB_NAME: ridesdb
      DB_USER: rides_user
      DB_PASSWORD: rides_pass
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ── Frontend Angular + Nginx ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend/rides-frontend
      dockerfile: Dockerfile
    container_name: rides_frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  mysql_data:
